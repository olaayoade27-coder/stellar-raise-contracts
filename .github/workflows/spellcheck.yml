name: Spellcheck

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  spellcheck:
    name: Spellcheck Markdown & YAML
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run spellcheck
        uses: streetsidesoftware/cspell-action@v8
        with:
          files: "**/*.{md,yml,yaml}"
          config: .cspell.json
          incremental_files_only: false
